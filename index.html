<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Glide: Square vs Square</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0c;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            /* Prevents pull-to-refresh on mobile */
            overscroll-behavior: none; 
        }

        #gameContainer {
            position: relative;
            /* Responsive sizing for both desktop and mobile */
            width: 100vw;
            max-width: 800px;
            aspect-ratio: 4 / 3; 
            max-height: 100vh;
            
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.9), 0 0 15px rgba(255, 255, 255, 0.05);
            border: 1px solid #222;
            border-radius: 8px;
            cursor: none; 
            overflow: hidden;
            /* Disables native touch actions like panning */
            touch-action: none; 
        }

        canvas {
            /* Premium dark grid background */
            background-color: #121214;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            display: block;
            width: 100%;
            height: 100%;
        }

        #scoreDisplay {
            position: absolute;
            top: 20px;
            left: 25px;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 10;
        }

        #messageDisplay {
            position: absolute;
            top: 25px;
            width: 100%;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
            opacity: 0;
            transition: opacity 0.4s ease-out;
            pointer-events: none;
            z-index: 10;
        }

        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.95) 100%);
            backdrop-filter: blur(4px);
            display: none; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: default; 
            z-index: 20;
        }

        #gameOverScreen h1 {
            color: #ff4444;
            font-size: 48px;
            margin-bottom: 30px;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(255, 68, 68, 0.5);
            text-align: center;
        }

        .stats-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .stat-box {
            background: rgba(40, 40, 45, 0.8);
            border: 1px solid #444;
            padding: 15px 30px;
            text-align: center;
            border-radius: 12px;
            width: 120px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .stat-title {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
        }

        button {
            margin-top: 40px;
            padding: 16px 50px;
            font-size: 18px;
            background: linear-gradient(135deg, #ffffff 0%, #dddddd 100%);
            color: #111;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 800;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            box-shadow: 0 5px 15px rgba(255,255,255,0.2);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255,255,255,0.3);
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            #scoreDisplay { font-size: 20px; top: 10px; left: 15px; }
            #gameOverScreen h1 { font-size: 36px; }
            .stat-box { width: 100px; padding: 10px 20px; }
            .stat-value { font-size: 24px; }
        }
    </style>
</head>
<body>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="scoreDisplay">Score: 0</div>
        <div id="messageDisplay">Speed Up! ⚡</div>
        
        <div id="gameOverScreen">
            <h1>GAME OVER</h1>
            <div class="stats-container">
                <div class="stat-box">
                    <div class="stat-title">Score</div>
                    <div class="stat-value" id="finalScore">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-title">Best</div>
                    <div class="stat-value" id="bestScore">0</div>
                </div>
            </div>
            <button onclick="resetGame()">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const messageDisplay = document.getElementById('messageDisplay');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const gameContainer = document.getElementById('gameContainer');
        const finalScoreEl = document.getElementById('finalScore');
        const bestScoreEl = document.getElementById('bestScore');

        let animationId;
        let isGameOver = false;
        let score = 0;
        let personalBest = localStorage.getItem('neonGlideBest') || 0;

        // Player object
        const player = {
            x: 400,
            y: 300,
            size: 20,
            color: '#ffffff',
            slideSpeed: 0.15 
        };

        // Pointer tracking
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;

        const collectible = {
            x: 0,
            y: 0,
            radius: 8,
            color: '#00ffaa' 
        };

        let enemies = [];

        // --- UNIVERSAL INPUT HANDLER (Mouse + Touch) ---
        function updatePointerPosition(e) {
            const rect = canvas.getBoundingClientRect();
            
            // Check if it's a touch event or a mouse event
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            // Map the screen coordinates to the canvas internal resolution
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            mouseX = (clientX - rect.left) * scaleX;
            mouseY = (clientY - rect.top) * scaleY;
        }

        // Desktop
        canvas.addEventListener('mousemove', updatePointerPosition);
        
        // Mobile
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault(); // Prevents screen scrolling while swiping
            updatePointerPosition(e);
        }, { passive: false });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            updatePointerPosition(e);
        }, { passive: false });


        // --- GAME LOGIC ---
        function spawnCollectible() {
            collectible.x = Math.random() * (canvas.width - 60) + 30;
            collectible.y = Math.random() * (canvas.height - 60) + 30;
        }

        function createEnemy() {
            const speed = (Math.random() * 2.5) + 3.5; 
            const dirX = Math.random() > 0.5 ? 1 : -1;
            const dirY = Math.random() > 0.5 ? 1 : -1;

            enemies.push({
                x: Math.random() * (canvas.width - 50) + 25, 
                y: Math.random() > 0.5 ? 20 : canvas.height - 20,
                size: 24,
                dx: speed * dirX,
                dy: speed * dirY,
                color: '#ff3355' 
            });
        }

        function showMessage(text) {
            messageDisplay.innerText = text;
            messageDisplay.style.opacity = 1;
            setTimeout(() => {
                messageDisplay.style.opacity = 0;
            }, 1200);
        }

        function gameOver() {
            isGameOver = true;
            cancelAnimationFrame(animationId);
            gameContainer.style.cursor = 'default'; 
            
            if (score > personalBest) {
                personalBest = score;
                localStorage.setItem('neonGlideBest', personalBest);
            }

            finalScoreEl.innerText = score;
            bestScoreEl.innerText = personalBest;
            gameOverScreen.style.display = 'flex';
        }

        function resetGame() {
            isGameOver = false;
            score = 0;
            scoreDisplay.innerText = `Score: ${score}`;
            gameOverScreen.style.display = 'none';
            gameContainer.style.cursor = 'none'; 
            
            player.x = canvas.width / 2;
            player.y = canvas.height / 2;
            mouseX = canvas.width / 2;
            mouseY = canvas.height / 2;
            
            enemies = [];
            for(let i=0; i < 5; i++) createEnemy(); 
            
            spawnCollectible();
            update(); 
        }

        function update() {
            if (isGameOver) return;

            // --- Premium Sliding Logic ---
            let targetX = mouseX - (player.size / 2);
            let targetY = mouseY - (player.size / 2);

            if (targetX < 0) targetX = 0;
            if (targetY < 0) targetY = 0;
            if (targetX + player.size > canvas.width) targetX = canvas.width - player.size;
            if (targetY + player.size > canvas.height) targetY = canvas.height - player.size;

            player.x += (targetX - player.x) * player.slideSpeed;
            player.y += (targetY - player.y) * player.slideSpeed;


            // --- Move Enemies & Bounce ---
            enemies.forEach(enemy => {
                enemy.x += enemy.dx;
                enemy.y += enemy.dy;

                if (enemy.x <= 0 || enemy.x + enemy.size >= canvas.width) {
                    enemy.dx *= -1;
                    if (enemy.x <= 0) enemy.x = 1;
                    if (enemy.x + enemy.size >= canvas.width) enemy.x = canvas.width - enemy.size - 1;
                }
                if (enemy.y <= 0 || enemy.y + enemy.size >= canvas.height) {
                    enemy.dy *= -1;
                    if (enemy.y <= 0) enemy.y = 1;
                    if (enemy.y + enemy.size >= canvas.height) enemy.y = canvas.height - enemy.size - 1;
                }

                // Enemy Collision Check
                if (player.x < enemy.x + enemy.size &&
                    player.x + player.size > enemy.x &&
                    player.y < enemy.y + enemy.size &&
                    player.y + player.size > enemy.y) {
                    gameOver();
                }
            });

            // --- Collectible Collision Check ---
            const distX = (player.x + player.size / 2) - collectible.x;
            const distY = (player.y + player.size / 2) - collectible.y;
            const distance = Math.sqrt(distX * distX + distY * distY);

            if (distance < (player.size / 2) + collectible.radius) {
                score += 10;
                scoreDisplay.innerText = `Score: ${score}`;
                spawnCollectible();

                if (score % 30 === 0) {
                    createEnemy(); 
                    showMessage("Speed Up! ⚡");
                    enemies.forEach(e => {
                        e.dx *= 1.08; 
                        e.dy *= 1.08;
                    });
                }
            }

            draw();
            animationId = requestAnimationFrame(update);
        }

        // --- DRAWING ---
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Collectible
            ctx.shadowBlur = 15;
            ctx.shadowColor = collectible.color;
            ctx.fillStyle = collectible.color;
            ctx.beginPath();
            ctx.arc(collectible.x, collectible.y, collectible.radius, 0, Math.PI * 2);
            ctx.fill();

            // Draw Enemies
            enemies.forEach(enemy => {
                ctx.shadowBlur = 12;
                ctx.shadowColor = enemy.color;
                ctx.fillStyle = enemy.color;
                ctx.beginPath();
                ctx.roundRect(enemy.x, enemy.y, enemy.size, enemy.size, 4);
                ctx.fill();
            });

            // Draw Player
            ctx.shadowBlur = 20;
            ctx.shadowColor = 'rgba(255, 255, 255, 0.8)';
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.roundRect(player.x, player.y, player.size, player.size, 4);
            ctx.fill();

            ctx.shadowBlur = 0;
        }

        resetGame();

    </script>
</body>
</html>
